<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        #div1{
            height: 50px;
            width: 200px;
            padding: 10px;
            margin: 3px;
            border: 1px solid black;
            background-color: lightblue;
        }
    </style>
    <div id="div1"> </div>
    <button>Pokaż rozmiar diva</button>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $(function($){
            $("button").click(function(){
                var text = "";
                text += "Szerokość diva:"+$("#div1").width()+"<br>";
                text += "Height of div: "+$("#div1").height();
                console.log($("#div1").height())
                $("#div1").html(text);
            })
        })
    </script>
</body>
</html>
