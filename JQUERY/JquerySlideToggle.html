<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $(function($){
            $("#flip").click(function(){
                $("#panel").slideToggle("slow");
            });
        })
    </script>
    <style>
        #panel,#flip{
            background-color: red;
        }
        #panel{
            padding: 50px;
            display: none;
        }
    </style>
    <div id="flip">Kliknij by rozwinąć</div>
    <div id="panel">Miłego dnia!</div>
</body>
</html>
