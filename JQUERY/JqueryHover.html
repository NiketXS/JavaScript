<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <h1>Hover</h1>
    <p id="p1">Akapit 1</p>
    <p>Akapit 2</p>
    <p>Akapit 3</p>
    <script>
        $(function(){
            $("#p1").hover(function(){
                alert("Wszedłeś do p1")
            },
            function(){
                alert("Opuszczasz p1")
            })
        });
    </script>
</body>
</html>
